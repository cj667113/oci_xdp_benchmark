[defaults]
inventory = ../inventory.ini
host_key_checking = False
forks = 20
pipelining = True
retry_files_enabled = False
stdout_callback = ansible.builtin.default
callback_result_format = yaml
timeout = 30

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
retries = 5
