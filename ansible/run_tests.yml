---
- name: Run benchmark clients and fetch result bundles
  hosts: clients
  become: true
  gather_facts: true
  vars:
    iperf_port: 5201
    udp_rate: "10G"
    duration: 30
    parallel_streams: 8
    ping_count: 100
    udp_len: 64
    benchmark_repetitions: 10
    test_label: "manual"
    run_id: "{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"
  tasks:
    - name: Pick peer and label for this client
      set_fact:
        target_peer_name: "{{ peer_name }}"
        bench_mode: "{{ test_label }}"
        bench_path: "{{ 'xdp' if bench_env == 'xdp' else 'firewall' }}"

    - name: Validate benchmark repetition count
      assert:
        that:
          - (benchmark_repetitions | int) > 0
          - (benchmark_repetitions | string) is match('^[1-9][0-9]*$')
        fail_msg: "benchmark_repetitions must be a positive integer"

    - name: Build benchmark label prefix
      set_fact:
        bench_label_prefix: "{{ bench_mode }}_{{ shape_key }}_{{ bench_path }}"

    - name: Read selected XDP capability from the target
      shell: |
        set -eu
        . /var/lib/oci-netbench/xdp-capabilities.env
        printf '%s\t%s\t%s\t%s\t%s\n' \
          "$XDP_REQUESTED_MODE" "$XDP_SELECTED_MODE" "$XDP_SELECTED_SECTION" \
          "$XDP_DRIVER" "$XDP_MTU"
      args:
        executable: /bin/bash
      delegate_to: "{{ target_peer_name }}"
      register: target_xdp_capability
      changed_when: false
      when: bench_env == 'xdp'

    - name: Normalize target XDP metadata
      set_fact:
        target_xdp_fields: "{{ target_xdp_capability.stdout.split('\t') if bench_env == 'xdp' else ['', '', '', '', ''] }}"

    - name: Run benchmark samples
      shell: |
        set -e
        /usr/local/bin/oci_netbench_run.sh \
          "{{ hostvars[target_peer_name].private_ip }}" \
          "{{ bench_label_prefix }}_run{{ '%02d' | format(sample_index | int) }}" \
          "{{ iperf_port }}" \
          "{{ udp_rate }}" \
          "{{ duration }}" \
          "{{ parallel_streams }}" \
          "{{ ping_count }}" \
          "{{ udp_len }}" \
          "{{ target_xdp_fields[0] }}" \
          "{{ target_xdp_fields[1] }}" \
          "{{ target_xdp_fields[2] }}" \
          "{{ target_xdp_fields[3] }}" \
          "{{ target_xdp_fields[4] }}" \
          "{{ sample_index }}" \
          "{{ benchmark_repetitions }}"
      args:
        executable: /bin/bash
      loop: "{{ range(1, (benchmark_repetitions | int) + 1) | list }}"
      loop_control:
        loop_var: sample_index
        label: "sample {{ sample_index }}/{{ benchmark_repetitions }}"
      register: bench_runs

    - name: Fetch result tarballs
      fetch:
        src: "{{ benchmark_run.stdout_lines[-1] }}"
        dest: "../results/{{ run_id }}/"
        flat: true
      loop: "{{ bench_runs.results }}"
      loop_control:
        loop_var: benchmark_run
        label: "{{ benchmark_run.stdout_lines[-1] }}"

    - name: Print result bundle paths
      debug:
        msg: "Fetched {{ benchmark_run.stdout_lines[-1] }} into results/{{ run_id }}/"
      loop: "{{ bench_runs.results }}"
      loop_control:
        loop_var: benchmark_run
        label: "{{ benchmark_run.stdout_lines[-1] }}"
